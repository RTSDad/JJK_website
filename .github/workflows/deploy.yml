name: Deploy React/Vite site to GitHub Pages

on:
  push:
    branches:
      - main  # triggers on pushes to main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd jjk-ranker
          npm install

      - name: Build site
        run: |
          cd jjk-ranker
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./jjk-ranker/dist
